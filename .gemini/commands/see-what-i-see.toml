description = """
Read the latest screenshot or HTML snapshot taken by the SeeWhatISee Chrome extension.

You can't run this autonomously since it requires the user to have just clicked the extension. Only run it when asked to.
"""
prompt = """
**If anything fails, do not try to debug or fix anything. Just report the failure.**

1. Read this JSON object:
!{$HOME/.gemini/scripts/copy-last-snapshot.sh}

2. The JSON contains:
   * `screenshot` — absolute path to a PNG file (optional)
   * `contents` — absolute path to an HTML file (optional, whole-page snapshot)
   * `selection` — absolute path to an HTML file containing just the
     user's selection region (text and HTML).
   * `highlights` — `true` if user-drawn red markup is baked into the screenshot.
   * `prompt` — the user's instruction for this capture.
   * `url` — the source URL.

3. Process the capture:
   * `screenshot`, `contents`, and `selection` are each optional — the record
     may have any subset, or none. If none are present, the URL (and optional
     prompt) is the whole payload.
   * If `screenshot` is present, read it.
     - If `highlights` is `true`, focus on the red marked areas.
   * If `contents` is present, read it only if needed to answer the user's prompt.
   * If `selection` is present, read it if needed to answer the user's prompt.
   * If `prompt` is present, treat it as the user's instruction for this capture.
     If no files were saved, the `url` is what the prompt is about.
   * If `prompt` is absent:
     - For screenshots, describe what you see and mention the `url`.
     - For selection-only, quote or summarize the fragment and mention the `url`.
     - For HTML-only, report the `url` and ask what they want to know.
     - For URL-only (no files), report the `url` and ask what they
       want to know about it.
"""
