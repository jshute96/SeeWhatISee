<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SeeWhatISee: Capture screenshot</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    margin: 24px;
    color: #222;
  }
  header {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 16px;
  }
  header img {
    width: 28px;
    height: 28px;
  }
  .controls {
    display: flex;
    align-items: center;
    gap: 24px;
    margin-bottom: 16px;
  }
  .checkboxes {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .checkboxes label {
    font-size: 14px;
  }
  .checkboxes input {
    vertical-align: middle;
    margin-right: 6px;
  }
  .prompt {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 1;
  }
  .prompt label {
    font-size: 14px;
    font-weight: 500;
  }
  .prompt input {
    flex: 1;
    padding: 6px 8px;
    font-size: 14px;
    border: 1px solid #bbb;
    border-radius: 4px;
  }
  button#capture {
    padding: 8px 16px;
    font-size: 14px;
    font-weight: 500;
    border: 1px solid #555;
    border-radius: 4px;
    background: #f5f5f5;
    cursor: pointer;
  }
  button#capture:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  hr {
    border: none;
    border-top: 2px solid #555;
    margin: 32px 0;
  }
  .image-box {
    width: 90%;
    margin: 0 auto;
    border: 1px solid #888;
    padding: 4px;
    box-sizing: border-box;
  }
  .image-box img {
    display: block;
    width: 100%;
    height: auto;
  }
</style>
</head>
<body>
  <header>
    <img src="icons/icon-48.png" alt="">
    <span>SeeWhatISee: Capture screenshot</span>
  </header>

  <div class="controls">
    <div class="checkboxes">
      <label><input type="checkbox" id="cap-screenshot" checked> Capture <u>s</u>creenshot</label>
      <label><input type="checkbox" id="cap-html"> Capture <u>H</u>TML</label>
    </div>
    <div class="prompt">
      <label for="prompt-text">Prompt:</label>
      <input type="text" id="prompt-text">
    </div>
    <button id="capture">Capture</button>
  </div>

  <hr>

  <div class="image-box">
    <img id="preview" alt="Captured page">
  </div>

  <script src="capture-page.js"></script>
</body>
</html>
