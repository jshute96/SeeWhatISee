<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SeeWhatISee: Capture screenshot or contents</title>
<!--
  highlight.js theme. Styles the <span class="hljs-*"> tokens produced
  by `hljs.highlight(...).value` inside the edit-dialog editor. We
  ship a small light theme (github.min.css) renamed to
  highlight-theme.css by build.mjs so it matches the rest of the
  page's light background.
-->
<link rel="stylesheet" href="highlight-theme.css">
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    margin: 24px;
    color: #222;
    /*
     * Hidden at first paint. capture-page.ts flips visibility back
     * to `visible` inside loadData once all fields (URL, HTML size,
     * preview image, Save selection state) have been populated.
     * Avoids the user watching values fill in one at a time during
     * the SW round-trip.
     */
    visibility: hidden;
  }
  header {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 16px;
  }
  header img {
    width: 28px;
    height: 28px;
  }
  /* Push the Options button to the far-right of the header and use
   * the page's flat-button style (matching `button#capture`,
   * `.highlight-bar button`, etc.) rather than user-agent default
   * chrome. */
  header #options-btn {
    margin-left: auto;
    padding: 4px 12px;
    font-size: 14px;
    font-weight: 400;
    border: 1px solid #555;
    border-radius: 4px;
    background: #f5f5f5;
    cursor: pointer;
  }
  .capture-info {
    margin: 0 0 16px 0;
    font-size: 14px;
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 4px 8px;
    align-items: center;
  }
  .capture-info .label {
    font-weight: 600;
  }
  .capture-info #captured-url {
    min-width: 0;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 13px;
    padding: 4px 6px;
    border: 1px solid #bbb;
    border-radius: 4px;
    background: #f5f5f5;
    color: #222;
  }
  .controls {
    display: flex;
    align-items: flex-start;
    gap: 24px;
    margin-bottom: 16px;
  }
  /*
   * Single grid for every Save row (screenshot / HTML / selection
   * master + the three format rows) so the per-row icon buttons
   * line up in fixed vertical columns regardless of which buttons
   * exist on a given row. Columns: [label] [copy] [download] [edit]
   * [error].
   *
   * `.checkbox-row` and `.selection-formats` use `display: contents`
   * so their direct children flow into the parent grid as if
   * unwrapped — this is what lets the format rows (nested inside
   * `.selection-formats`) share the *same* column tracks as the
   * top-level rows so every Copy / Save / Edit icon stacks vertically.
   *
   * Items rely on `grid-auto-flow: row` (default, sparse): each row's
   * children are emitted in source order in increasing column order
   * (copy → download → edit), so the cursor never has to backtrack —
   * if it did, the auto-placement algorithm would push the
   * "earlier-column" item onto a fresh grid row. Reordering the icons
   * in DOM also requires keeping that invariant.
   *
   * `.has-error` rows always have copy / download / edit `disabled`
   * (and hidden via `.copy-btn:disabled { display: none }`), which is
   * what frees column 2 for the error icon to share — see the
   * `.error-icon` rule below.
   */
  .checkboxes {
    display: grid;
    /*
     * Icon columns sit flush (no column-gap between them) — the
     * 22px button is wider than its 14px icon, so adjacent icons
     * already have visible breathing room from the per-button
     * padding. The label column gets explicit `padding-right` and
     * the error-icon column an explicit `margin-left` below so the
     * icon strip doesn't bleed into them.
     */
    grid-template-columns: max-content 22px 22px 22px max-content;
    column-gap: 0;
    row-gap: 2px;
    align-items: center;
  }
  .checkbox-row,
  .selection-formats {
    display: contents;
  }
  /*
   * `[hidden]` is normally `display: none`, but our `display:
   * contents` rule above has equal specificity and would win on
   * source order alone. The attribute selector below outranks it
   * (one extra attribute selector), so the format-row block stays
   * hidden until loadData() reveals it. `display: none` on the
   * wrapper hides the entire subtree even though the wrapper itself
   * has no box.
   */
  .selection-formats[hidden] {
    display: none;
  }
  .checkbox-row > label { grid-column: 1; padding-right: 6px; }
  .checkbox-row > .col-copy { grid-column: 2; }
  .checkbox-row > .col-download { grid-column: 3; }
  .checkbox-row > .col-edit { grid-column: 4; }
  /*
   * Error icon shares column 2 with the Copy button. A row only ever
   * shows one or the other: when `has-error` is set, the row's
   * Copy/Edit/Download buttons are all disabled (and hidden via
   * `.copy-btn:disabled { display: none }`), so column 2 is free
   * for the error indicator. Putting the error in the leftmost icon
   * column keeps the indicator tight against the label rather than
   * stranded out past empty button slots.
   */
  /*
   * The icon column is 22px wide (sized to the Copy button), but the
   * error glyph is only 16px — `justify-self: center` parks it in
   * the middle of the column so it lines up under the centered icon
   * glyphs in the rows above instead of hugging the column's left
   * edge.
   */
  .checkbox-row > .error-icon { grid-column: 2; justify-self: center; }
  /*
   * Indent the three "as HTML / text / markdown" rows so they read
   * as children of the master "Save selection:" checkbox above.
   * The indent lives on the label only (not the row, which has no
   * box thanks to `display: contents`) so the row's icons still
   * land in the shared columns 2–4 instead of shifting right with
   * the label.
   */
  #row-selection-html > label,
  #row-selection-text > label,
  #row-selection-markdown > label {
    padding-left: 22px;
  }
  .checkboxes label {
    font-size: 14px;
  }
  .checkboxes input {
    vertical-align: middle;
    margin-right: 6px;
  }
  .copy-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 22px;
    height: 22px;
    padding: 0;
    border: 1px solid transparent;
    border-radius: 3px;
    background: transparent;
    color: #555;
    cursor: pointer;
  }
  .copy-btn:hover {
    background: #eee;
    border-color: #bbb;
    color: #222;
  }
  /*
   * Disabled Copy button (e.g. Save selection with no selection
   * captured): hide outright rather than greying. A greyed icon
   * still reacts to hover via the shared rule above, which reads
   * as a dead control.
   */
  .copy-btn:disabled {
    display: none;
  }
  .copy-btn svg {
    width: 14px;
    height: 14px;
  }
  /*
   * Grey out the label whenever its checkbox is disabled — covers
   * both the no-selection default and the failed-scrape error case
   * so they look identical (browser-default disabled checkbox styling
   * already takes care of the box itself; this is the matching label
   * fade). Uses `:has()`, fine for our Chrome-only target.
   */
  .checkbox-row:has(input:disabled) label {
    color: #888;
  }
  /*
   * Row-level error indicator. `capture-page.ts` toggles `.has-error`
   * on `.checkbox-row` when the SW reports the corresponding artifact
   * couldn't be captured (restricted URL, blocked scrape, etc.). The
   * error icon becomes visible and its `title` carries the SW-reported
   * reason so hovering it explains why the row is disabled. The label
   * fade comes from the disabled-checkbox rule above.
   */
  .error-icon {
    display: none;
    align-items: center;
    justify-content: center;
    width: 16px;
    height: 16px;
    color: #c0392b;
    cursor: help;
  }
  .checkbox-row.has-error .error-icon {
    display: inline-flex;
  }
  .error-icon svg {
    width: 14px;
    height: 14px;
  }
  /*
   * The HTML edit dialog reuses a modal <dialog> element. We hide it
   * in CSS rather than via an attribute so toggling via JS doesn't
   * need to fight the native display. The editor is full-width with
   * a capped max-height so it never pushes the action row off-screen
   * — it scrolls internally on long bodies instead.
   */
  dialog.edit-dialog {
    width: min(900px, 90vw);
    max-height: 85vh;
    padding: 16px;
    border: 1px solid #555;
    border-radius: 6px;
    background: #fff;
  }
  dialog.edit-dialog::backdrop {
    background: rgba(0, 0, 0, 0.35);
  }
  .edit-dialog h2 {
    margin: 0;
    font-size: 16px;
    font-weight: 600;
  }
  .edit-dialog-titlebar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }
  /*
   * Edit / Preview segmented control. The two buttons share a
   * border so they read as a single widget; the selected one keeps
   * an inset "pressed" look. capture-page.ts toggles `.selected`
   * and `aria-pressed` on click.
   */
  .edit-dialog-mode-toggle {
    display: inline-flex;
    border: 1px solid #555;
    border-radius: 4px;
    overflow: hidden;
  }
  /*
   * Explicit `display` rules override the user-agent `[hidden]`
   * default of `display: none`, so the toggle would always render
   * — including on dialogs that have no preview mode (the text
   * dialog). Re-assert `none` for the hidden state.
   */
  .edit-dialog-mode-toggle[hidden] {
    display: none;
  }
  .edit-dialog-mode-toggle button {
    padding: 4px 12px;
    font-size: 13px;
    border: none;
    background: #f5f5f5;
    color: #222;
    cursor: pointer;
  }
  .edit-dialog-mode-toggle button + button {
    border-left: 1px solid #555;
  }
  .edit-dialog-mode-toggle button.selected {
    background: #555;
    color: #fff;
    cursor: default;
  }
  /*
   * In-dialog "Download this file" button. Sits in the titlebar to
   * the right of the Edit/Preview toggle (when present) and is
   * always shown — even on dialogs without a preview mode. Styled
   * to match the segmented Edit/Preview control's visual weight
   * (same padding / font / border) so they read as siblings rather
   * than as the small icon-only buttons used on the main page.
   */
  .edit-dialog-download {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 12px;
    font-size: 13px;
    border: 1px solid #555;
    border-radius: 4px;
    background: #f5f5f5;
    color: #222;
    cursor: pointer;
  }
  .edit-dialog-download:hover {
    background: #eee;
  }
  .edit-dialog-download svg {
    width: 14px;
    height: 14px;
  }
  /*
   * The editor is a `contenteditable` <div> (not a <textarea>) because
   * CodeJar rewrites its own inner HTML with highlight.js-produced
   * <span class="hljs-*"> tokens on every input. The styles below
   * mirror the old textarea dimensions so the dialog slot keeps the
   * same intrinsic size across mode switches. `white-space: pre-wrap`
   * preserves user-entered newlines + indentation the way a textarea
   * would; `overflow: auto` + `resize: vertical` keep the
   * user-resizable feel. `caret-color` is explicit because the hljs
   * theme can override the inherited text color on child spans, which
   * in some browsers also dims the caret.
   */
  .edit-dialog .edit-dialog-textarea {
    display: block;
    width: 100%;
    min-height: 320px;
    max-height: 60vh;
    padding: 8px;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 13px;
    line-height: 1.4;
    border: 1px solid #bbb;
    border-radius: 4px;
    box-sizing: border-box;
    resize: vertical;
    overflow: auto;
    white-space: pre-wrap;
    word-break: break-word;
    outline: none;
    /* Use the theme's text color for the caret so they match. */
    caret-color: currentColor;
    /*
     * The github.min.css theme sets its own `background` / `color` on
     * `.hljs`, which CodeJar adds to the editor element. Leave those
     * to the theme — we only override layout-affecting properties
     * here so the editor keeps its dialog-slot geometry.
     */
  }
  .edit-dialog .edit-dialog-textarea:focus-visible {
    border-color: #555;
  }
  /*
   * Body slot holds the editor + iframe. `position: relative`
   * anchors the iframe's `inset: 0` overlay to exactly the
   * editor's rect, so flipping modes can't shift dialog
   * dimensions by even a pixel. The editor keeps defining the
   * slot's intrinsic size; the iframe paints on top.
   */
  .edit-dialog-body {
    position: relative;
  }
  .edit-dialog iframe.edit-dialog-preview:not([hidden]) {
    display: block;
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: 1px solid #bbb;
    border-radius: 4px;
    background: #fff;
    box-sizing: border-box;
  }
  .edit-dialog .dialog-error {
    margin: 8px 0 0 0;
    padding: 6px 8px;
    color: #b00020;
    background: #fdecea;
    border: 1px solid #f5c6cb;
    border-radius: 4px;
    font-size: 13px;
  }
  .edit-dialog .dialog-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 12px;
  }
  .edit-dialog .dialog-actions button {
    padding: 6px 14px;
    font-size: 14px;
    border: 1px solid #555;
    border-radius: 4px;
    background: #f5f5f5;
    cursor: pointer;
  }
  .prompt {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    flex: 1;
  }
  .prompt label {
    font-size: 14px;
    font-weight: bold;
    padding-top: 7px;
  }
  .prompt textarea {
    flex: 1;
    padding: 6px 8px;
    font-size: 14px;
    font-family: inherit;
    line-height: 1.4;
    border: 1px solid #bbb;
    border-radius: 4px;
    resize: none;
    max-height: 200px;
    overflow-y: hidden;
    box-sizing: border-box;
  }
  button#capture {
    padding: 8px 16px;
    font-size: 14px;
    font-weight: 500;
    border: 1px solid #555;
    border-radius: 4px;
    background: #f5f5f5;
    cursor: pointer;
  }
  button#capture:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  .highlight-bar {
    margin: 0 0 8px 0;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
  }
  .highlight-bar button {
    padding: 4px 12px;
    font-size: 14px;
    border: 1px solid #555;
    border-radius: 4px;
    background: #f5f5f5;
    cursor: pointer;
  }
  .highlight-bar button:disabled {
    opacity: 0.5;
  }
  hr {
    border: none;
    border-top: 2px solid #555;
    margin: 32px 0;
  }
  .image-box {
    display: flex;
    justify-content: center;
  }
  .image-wrap {
    position: relative;
    display: inline-block;
    border: 1px solid #888;
    line-height: 0;
    font-size: 0;
  }
  .image-box img {
    display: block;
    /* 90% of body content width (body has 24px margin on each side).
       max-height is set inline by fitImage() to fill remaining viewport. */
    max-width: calc((100vw - 48px) * 0.9 - 2px);
    width: auto;
    height: auto;
  }
  #overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    cursor: crosshair;
    user-select: none;
  }
</style>
</head>
<body>
  <!--
    Inline SVG sprite: every <use href="#copy-icon"> below points back
    here so the glyph is defined once. The host <svg> is hidden so it
    doesn't reserve layout space; <symbol> + <use> are the standard
    SVG primitive for this and don't need any JS.
  -->
  <svg width="0" height="0" style="position: absolute" aria-hidden="true">
    <defs>
      <!-- Standard "copy" glyph: two overlapping rounded rects. -->
      <symbol id="copy-icon" viewBox="0 0 24 24">
        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"
              fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round"></rect>
        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"
              fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round"></path>
      </symbol>
      <!-- Error glyph: filled circle with a white exclamation mark. -->
      <symbol id="error-icon" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="10" fill="currentColor"></circle>
        <rect x="11" y="6" width="2" height="8" fill="#fff"></rect>
        <rect x="11" y="16" width="2" height="2" fill="#fff"></rect>
      </symbol>
      <!-- Pencil glyph — edit action on the HTML row. -->
      <symbol id="edit-icon" viewBox="0 0 24 24">
        <path d="M4 20h4L19 9l-4-4L4 16v4z"
              fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round"></path>
        <path d="M14 6l4 4"
              fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round"></path>
      </symbol>
      <!-- Download glyph — arrow into a tray. Shown on the per-row
           "Save as…" buttons that open a native save dialog with the
           current edited body. -->
      <symbol id="download-icon" viewBox="0 0 24 24">
        <path d="M12 4v11"
              fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round"></path>
        <path d="M7 11l5 5 5-5"
              fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round"></path>
        <path d="M5 20h14"
              fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round"></path>
      </symbol>
    </defs>
  </svg>

  <header>
    <img src="icons/icon-48.png" alt="">
    <span>SeeWhatISee: Capture screenshot or contents</span>
    <button type="button" id="options-btn">Options</button>
  </header>

  <div class="capture-info">
    <label class="label" for="captured-url">Captured URL:</label>
    <input type="text" id="captured-url" readonly value="">
    <span class="label">HTML size:</span>
    <span id="html-size"></span>
  </div>

  <div class="controls">
    <div class="checkboxes">
      <div class="checkbox-row" id="row-screenshot">
        <label><input type="checkbox" id="cap-screenshot" checked> Save <u>s</u>creenshot</label>
        <button type="button" class="copy-btn col-copy" id="copy-screenshot-name"
                title="Copy PNG filename"
                aria-label="Copy screenshot filename">
          <svg aria-hidden="true"><use href="#copy-icon"></use></svg>
        </button>
        <button type="button" class="copy-btn col-download" id="download-screenshot-btn"
                title="Save screenshot"
                aria-label="Save screenshot">
          <svg aria-hidden="true"><use href="#download-icon"></use></svg>
        </button>
        <span class="error-icon" id="error-screenshot" title="" role="img"
              aria-label="Screenshot capture error">
          <svg aria-hidden="true"><use href="#error-icon"></use></svg>
        </span>
      </div>
      <div class="checkbox-row" id="row-html">
        <label><input type="checkbox" id="cap-html"> Save <u>H</u>TML</label>
        <button type="button" class="copy-btn col-copy" id="copy-html-name"
                title="Copy HTML filename"
                aria-label="Copy HTML filename">
          <svg aria-hidden="true"><use href="#copy-icon"></use></svg>
        </button>
        <!--
          Edit the captured HTML before save. Opens a modal dialog
          with an editor prefilled with the current HTML. Follows the
          same disabled-hides-the-button convention as copy-btn so the
          row stays tidy. Disabled (and hidden) when the HTML scrape
          failed — there's nothing to edit in that case.
        -->
        <button type="button" class="copy-btn col-download" id="download-html-btn"
                title="Save HTML"
                aria-label="Save HTML">
          <svg aria-hidden="true"><use href="#download-icon"></use></svg>
        </button>
        <button type="button" class="copy-btn col-edit" id="edit-html"
                title="Edit page contents HTML"
                aria-label="Edit page contents HTML">
          <svg aria-hidden="true"><use href="#edit-icon"></use></svg>
        </button>
        <span class="error-icon" id="error-html" title="" role="img"
              aria-label="HTML capture error">
          <svg aria-hidden="true"><use href="#error-icon"></use></svg>
        </span>
      </div>
      <!--
        Save selection is a master checkbox plus three mutually-
        exclusive radios picking which serialization format to
        write. A single capture can only produce one selection
        file; the master checkbox decides whether to write any,
        and the radios pick which one.

        Interactions, wired up in capture-page.ts:
          - Toggling the master off unchecks all three radios.
          - Toggling it back on restores the default radio (the
            first format with non-empty content) so the user
            doesn't have to manually re-pick.
          - Clicking a radio also checks the master — picking a
            format implies "yes save the selection."

        Per-format Copy + Edit buttons still sit next to each
        radio so the user can pre-materialize or edit any format
        to disk independent of which one ends up getting saved.

        Default state: master disabled + unchecked; all three
        radios + their Copy / Edit disabled. capture-page.ts's
        loadData() flips these on based on selection presence
        (master) and per-format content (radios). The body stays
        `visibility: hidden` until loadData resolves so the user
        never sees the disabled-default state.
      -->
      <div class="checkbox-row" id="row-selection">
        <label><input type="checkbox" id="cap-selection" disabled>
          Save selectio<u>n</u></label>
        <span class="error-icon" id="error-selection" title="" role="img"
              aria-label="Selection capture error">
          <svg aria-hidden="true"><use href="#error-icon"></use></svg>
        </span>
      </div>
      <!--
        Hidden by default. capture-page.ts's loadData() reveals
        this block only when at least one format has saveable
        content. If no selection was captured at all, or every
        format trimmed to empty (whitespace-only selection, etc.),
        the block stays hidden and the error — if any — surfaces
        on the master "Save selection" row above.
      -->
      <div class="selection-formats" hidden>
        <div class="checkbox-row" id="row-selection-html">
          <label><input type="radio" name="cap-selection-format" value="html"
                        id="cap-selection-html" disabled>
            as HTM<u>L</u></label>
          <button type="button" class="copy-btn col-copy" id="copy-selection-html-name"
                  title="Copy selection HTML filename"
                  aria-label="Copy selection HTML filename" disabled>
            <svg aria-hidden="true"><use href="#copy-icon"></use></svg>
          </button>
          <button type="button" class="copy-btn col-download" id="download-selection-html-btn"
                  title="Save selection HTML"
                  aria-label="Save selection HTML" disabled>
            <svg aria-hidden="true"><use href="#download-icon"></use></svg>
          </button>
          <button type="button" class="copy-btn col-edit" id="edit-selection-html-btn"
                  title="Edit selection HTML"
                  aria-label="Edit selection HTML" disabled>
            <svg aria-hidden="true"><use href="#edit-icon"></use></svg>
          </button>
          <span class="error-icon" id="error-selection-html" title="" role="img"
                aria-label="Selection HTML capture error">
            <svg aria-hidden="true"><use href="#error-icon"></use></svg>
          </span>
        </div>
        <div class="checkbox-row" id="row-selection-text">
          <label><input type="radio" name="cap-selection-format" value="text"
                        id="cap-selection-text" disabled>
            as <u>t</u>ext</label>
          <button type="button" class="copy-btn col-copy" id="copy-selection-text-name"
                  title="Copy selection text filename"
                  aria-label="Copy selection text filename" disabled>
            <svg aria-hidden="true"><use href="#copy-icon"></use></svg>
          </button>
          <button type="button" class="copy-btn col-download" id="download-selection-text-btn"
                  title="Save selection text"
                  aria-label="Save selection text" disabled>
            <svg aria-hidden="true"><use href="#download-icon"></use></svg>
          </button>
          <button type="button" class="copy-btn col-edit" id="edit-selection-text-btn"
                  title="Edit selection text"
                  aria-label="Edit selection text" disabled>
            <svg aria-hidden="true"><use href="#edit-icon"></use></svg>
          </button>
          <span class="error-icon" id="error-selection-text" title="" role="img"
                aria-label="Selection text capture error">
            <svg aria-hidden="true"><use href="#error-icon"></use></svg>
          </span>
        </div>
        <div class="checkbox-row" id="row-selection-markdown">
          <label><input type="radio" name="cap-selection-format" value="markdown"
                        id="cap-selection-markdown" disabled>
            as <u>m</u>arkdown</label>
          <button type="button" class="copy-btn col-copy" id="copy-selection-markdown-name"
                  title="Copy selection markdown filename"
                  aria-label="Copy selection markdown filename" disabled>
            <svg aria-hidden="true"><use href="#copy-icon"></use></svg>
          </button>
          <button type="button" class="copy-btn col-download" id="download-selection-markdown-btn"
                  title="Save selection markdown"
                  aria-label="Save selection markdown" disabled>
            <svg aria-hidden="true"><use href="#download-icon"></use></svg>
          </button>
          <button type="button" class="copy-btn col-edit" id="edit-selection-markdown-btn"
                  title="Edit selection markdown"
                  aria-label="Edit selection markdown" disabled>
            <svg aria-hidden="true"><use href="#edit-icon"></use></svg>
          </button>
          <span class="error-icon" id="error-selection-markdown" title="" role="img"
                aria-label="Selection markdown capture error">
            <svg aria-hidden="true"><use href="#error-icon"></use></svg>
          </span>
        </div>
      </div>
    </div>
    <button id="capture"><u>C</u>apture</button>
    <div class="prompt">
      <label for="prompt-text">Prompt:</label>
      <textarea id="prompt-text" rows="1"></textarea>
    </div>
  </div>

  <!--
    Highlight toolbar. Drag on the image draws red rectangles; right-
    click-drag draws red lines. Redact converts the most recent
    unconverted red rectangle into an opaque black box (irreversibly
    hiding whatever was underneath in the saved PNG). Crop converts
    the most recent unconverted red rectangle at the top of the stack
    into a crop region (dims everything outside and shrinks the saved
    PNG to just that region). Both conversions are undoable.
  -->
  <div class="highlight-bar">
    <span><b>Add highlights below.</b> Drag to draw boxes, right-click-drag to draw lines. Drag edges to crop.</span>
    <button id="redact" disabled
            title="Turn the last drawn box into a black redaction.">Redact</button>
    <button id="crop" disabled
            title="Crop the screenshot to the last drawn box.">Crop</button>
    <button id="undo" disabled
            title="Undo the most recent edit.">Undo</button>
    <button id="clear" disabled
            title="Clear all edits.">Clear</button>
  </div>

  <hr>

  <div class="image-box">
    <div class="image-wrap">
      <img id="preview" alt="Captured page">
      <svg id="overlay" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
  </div>

  <!--
    Edit-dialog template. Each editable artifact kind (HTML,
    selection, …) gets a cloned instance appended to <body> by
    capture-page.ts's `createEditDialog`, which fills in the
    per-kind `id`s, title text, and aria labels. Keeping the markup
    here (rather than building nodes by hand in JS) lets CSS
    selectors like `.edit-dialog .edit-dialog-textarea` apply
    uniformly to every instance. New kinds don't need any new markup.

    The per-instance ids follow a `edit-${kind}-${role}` convention
    (e.g. `edit-html-dialog`, `edit-selection-textarea`) so the e2e
    tests can locate the right element without the test file
    having to care which kinds exist.
  -->
  <template id="edit-dialog-template">
    <dialog class="edit-dialog">
      <!--
        Title row. For HTML-capable kinds (html, selectionHtml), the
        mode-toggle slot holds an Edit / Preview segmented control
        wired up by capture-page.ts. For non-previewable kinds the
        slot stays empty and the row is just the title.
      -->
      <div class="edit-dialog-titlebar">
        <h2 class="edit-dialog-title"></h2>
        <div class="edit-dialog-mode-toggle" hidden role="group"
             aria-label="View mode">
          <button type="button" class="edit-dialog-mode-edit selected"
                  aria-pressed="true">Edit</button>
          <button type="button" class="edit-dialog-mode-preview"
                  aria-pressed="false">Preview</button>
        </div>
        <!--
          Save the in-dialog (un-committed) editor body to a user-
          chosen path via chrome.downloads.download({ saveAs: true }).
          Mirrors the per-row Save-as button on the main page, but
          writes whatever is currently typed in the dialog rather
          than the committed `captured[kind]` body — so the user can
          export an experimental edit without first clicking Save.
        -->
        <button type="button" class="edit-dialog-download"
                title="Download this file">
          <svg aria-hidden="true"><use href="#download-icon"></use></svg>
          Download
        </button>
      </div>
      <!--
        Body slot. The editor is always in the DOM so the user's
        resize stays sticky and the slot height stays constant across
        mode switches. In Preview mode, capture-page.ts sets
        `visibility: hidden` on the editor (to keep its layout
        footprint) and reveals the iframe, which is positioned
        absolutely on top via `.edit-dialog-body { position: relative }`
        + `.edit-dialog-preview { inset: 0 }`. The iframe uses a blob:
        URL rather than `srcdoc` because `srcdoc` has an attribute-
        size limit that truncates large captured HTML to blank. sandbox
        denies scripts / forms / same-origin / top navigation; the two
        `allow-popups` tokens let `target="_blank"` clicks open a
        normal new tab.
      -->
      <div class="edit-dialog-body">
        <!--
          CodeJar-driven editor. capture-page.ts wraps this element
          with `CodeJar(el, highlight)`; the chosen highlighter
          depends on the kind (xml for html/selectionHtml, markdown
          for selectionMarkdown, a no-op for plain-text kinds). The
          element is `contenteditable="plaintext-only"` so the user
          can only enter plain text — CodeJar rewrites the innerHTML
          on input using highlight.js tokens, and plaintext-only
          prevents the browser's native rich-text paste from
          injecting formatting the highlighter would then have to
          strip. `aria-multiline="true"` makes screen readers treat
          it as a textarea-like control. role="textbox" keeps the
          semantics close to the old <textarea> so existing aria
          wiring still applies.
        -->
        <div class="edit-dialog-textarea"
             contenteditable="plaintext-only"
             spellcheck="false"
             role="textbox"
             aria-multiline="true"></div>
        <iframe class="edit-dialog-preview" hidden
                sandbox="allow-popups allow-popups-to-escape-sandbox"
                referrerpolicy="no-referrer"
                title="Rendered HTML preview"></iframe>
      </div>
      <!--
        Hidden until Save fails; capture-page.ts toggles `hidden`
        and writes the SW error message into textContent.
        `role="alert"` lets screen readers announce it on appear.
      -->
      <p class="edit-dialog-error dialog-error" role="alert" hidden></p>
      <div class="dialog-actions">
        <button type="button" class="edit-dialog-cancel">Cancel</button>
        <button type="button" class="edit-dialog-save"
                title="Commit these changes">Save</button>
      </div>
    </dialog>
  </template>

  <!--
    Marked (markdown → HTML) runs in the page rather than the SW so we
    keep the rendering close to the dialog. Loaded before
    capture-page.js so `window.marked` is available when setMode()
    renders the Selection markdown preview. capture-page.ts pipes
    marked's HTML output through the same `buildPreviewHtml`
    sanitizer used by the HTML previews (strips <script> and
    <meta http-equiv=refresh>, injects <meta charset> and
    <base target=_blank>), so raw HTML inside markdown can't execute
    anything beyond what the sandboxed iframe already permits.
  -->
  <script src="marked.umd.js"></script>
  <!--
    highlight.js ships the prebuilt "common" bundle (xml, markdown,
    plaintext, and many more) as a classic script that attaches to
    `window.hljs`. Loaded before capture-page.js so CodeJar's
    highlighter callback can call `hljs.highlight(code, {language})`
    synchronously on every input.
  -->
  <script src="highlight.min.js"></script>
  <!--
    CodeJar is ESM-only upstream; build.mjs rewrites its single
    `export function CodeJar` into a `window.CodeJar` assignment so
    we can load it here as a classic script (same pattern as
    `marked.umd.js`). Must precede capture-page.js so the global is
    in place before `bindEditDialog` instantiates editors.
  -->
  <script src="codejar.js"></script>
  <script src="capture-page.js"></script>
</body>
</html>
