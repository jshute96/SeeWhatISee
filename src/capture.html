<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SeeWhatISee: Capture screenshot</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    margin: 24px;
    color: #222;
  }
  header {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 16px;
  }
  header img {
    width: 28px;
    height: 28px;
  }
  .capture-info {
    margin: 0 0 16px 0;
    font-size: 14px;
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 4px 8px;
    align-items: center;
  }
  .capture-info .label {
    font-weight: 600;
  }
  .capture-info #captured-url {
    min-width: 0;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 13px;
    padding: 4px 6px;
    border: 1px solid #bbb;
    border-radius: 4px;
    background: #f5f5f5;
    color: #222;
  }
  .controls {
    display: flex;
    align-items: flex-start;
    gap: 24px;
    margin-bottom: 16px;
  }
  .checkboxes {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .checkboxes label {
    font-size: 14px;
  }
  .checkboxes input {
    vertical-align: middle;
    margin-right: 6px;
  }
  .prompt {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    flex: 1;
  }
  .prompt label {
    font-size: 14px;
    font-weight: 500;
    padding-top: 7px;
  }
  .prompt textarea {
    flex: 1;
    padding: 6px 8px;
    font-size: 14px;
    font-family: inherit;
    line-height: 1.4;
    border: 1px solid #bbb;
    border-radius: 4px;
    resize: none;
    max-height: 200px;
    overflow-y: hidden;
    box-sizing: border-box;
  }
  button#capture {
    padding: 8px 16px;
    font-size: 14px;
    font-weight: 500;
    border: 1px solid #555;
    border-radius: 4px;
    background: #f5f5f5;
    cursor: pointer;
  }
  button#capture:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  .highlight-bar {
    margin: 0 0 8px 0;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
  }
  .highlight-bar button {
    padding: 4px 12px;
    font-size: 14px;
    border: 1px solid #555;
    border-radius: 4px;
    background: #f5f5f5;
    cursor: pointer;
  }
  .highlight-bar button:disabled {
    opacity: 0.5;
  }
  hr {
    border: none;
    border-top: 2px solid #555;
    margin: 32px 0;
  }
  .image-box {
    display: flex;
    justify-content: center;
  }
  .image-wrap {
    position: relative;
    display: inline-block;
    border: 1px solid #888;
    line-height: 0;
    font-size: 0;
  }
  .image-box img {
    display: block;
    /* 90% of body content width (body has 24px margin on each side).
       max-height is set inline by fitImage() to fill remaining viewport. */
    max-width: calc((100vw - 48px) * 0.9 - 2px);
    width: auto;
    height: auto;
  }
  #overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    cursor: crosshair;
    user-select: none;
  }
</style>
</head>
<body>
  <header>
    <img src="icons/icon-48.png" alt="">
    <span>SeeWhatISee: Capture screenshot</span>
  </header>

  <div class="capture-info">
    <label class="label" for="captured-url">Captured URL:</label>
    <input type="text" id="captured-url" readonly value="">
    <span class="label">HTML size:</span>
    <span id="html-size"></span>
  </div>

  <div class="controls">
    <div class="checkboxes">
      <label><input type="checkbox" id="cap-screenshot" checked> Save <u>s</u>creenshot</label>
      <label><input type="checkbox" id="cap-html"> Save <u>H</u>TML</label>
    </div>
    <button id="capture">Capture</button>
    <div class="prompt">
      <label for="prompt-text">Prompt:</label>
      <textarea id="prompt-text" rows="1"></textarea>
    </div>
  </div>

  <div class="highlight-bar">
    <span><b>Add highlights below.</b> Click for points, drag for boxes, right-click-drag for lines.</span>
    <button id="undo" disabled>Undo</button>
    <button id="clear" disabled>Clear</button>
  </div>

  <hr>

  <div class="image-box">
    <div class="image-wrap">
      <img id="preview" alt="Captured page">
      <svg id="overlay" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
  </div>

  <script src="capture-page.js"></script>
</body>
</html>
