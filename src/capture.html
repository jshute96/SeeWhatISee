<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SeeWhatISee: Capture screenshot</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    margin: 24px;
    color: #222;
    /*
     * Hidden at first paint. capture-page.ts flips visibility back
     * to `visible` inside loadData once all fields (URL, HTML size,
     * preview image, Save selection state) have been populated.
     * Avoids the user watching values fill in one at a time during
     * the SW round-trip.
     */
    visibility: hidden;
  }
  header {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 16px;
  }
  header img {
    width: 28px;
    height: 28px;
  }
  .capture-info {
    margin: 0 0 16px 0;
    font-size: 14px;
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 4px 8px;
    align-items: center;
  }
  .capture-info .label {
    font-weight: 600;
  }
  .capture-info #captured-url {
    min-width: 0;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 13px;
    padding: 4px 6px;
    border: 1px solid #bbb;
    border-radius: 4px;
    background: #f5f5f5;
    color: #222;
  }
  .controls {
    display: flex;
    align-items: flex-start;
    gap: 24px;
    margin-bottom: 16px;
  }
  .checkboxes {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .checkbox-row {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .checkboxes label {
    font-size: 14px;
  }
  .checkboxes input {
    vertical-align: middle;
    margin-right: 6px;
  }
  .copy-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 22px;
    height: 22px;
    padding: 0;
    border: 1px solid transparent;
    border-radius: 3px;
    background: transparent;
    color: #555;
    cursor: pointer;
  }
  .copy-btn:hover {
    background: #eee;
    border-color: #bbb;
    color: #222;
  }
  /*
   * Disabled Copy button (e.g. Save selection with no selection
   * captured): hide outright rather than greying. A greyed icon
   * still reacts to hover via the shared rule above, which reads
   * as a dead control.
   */
  .copy-btn:disabled {
    display: none;
  }
  .copy-btn svg {
    width: 14px;
    height: 14px;
  }
  /*
   * Grey out the label whenever its checkbox is disabled — covers
   * both the no-selection default and the failed-scrape error case
   * so they look identical (browser-default disabled checkbox styling
   * already takes care of the box itself; this is the matching label
   * fade). Uses `:has()`, fine for our Chrome-only target.
   */
  .checkbox-row:has(input:disabled) label {
    color: #888;
  }
  /*
   * Row-level error indicator. `capture-page.ts` toggles `.has-error`
   * on `.checkbox-row` when the SW reports the corresponding artifact
   * couldn't be captured (restricted URL, blocked scrape, etc.). The
   * error icon becomes visible and its `title` carries the SW-reported
   * reason so hovering it explains why the row is disabled. The label
   * fade comes from the disabled-checkbox rule above.
   */
  .error-icon {
    display: none;
    align-items: center;
    justify-content: center;
    width: 16px;
    height: 16px;
    color: #c0392b;
    cursor: help;
  }
  .checkbox-row.has-error .error-icon {
    display: inline-flex;
  }
  .error-icon svg {
    width: 14px;
    height: 14px;
  }
  /*
   * The HTML edit dialog reuses a modal <dialog> element. We hide it
   * in CSS rather than via an attribute so toggling via JS doesn't
   * need to fight the native display. The textarea is full-width with
   * a capped max-height so it never pushes the action row off-screen
   * — it scrolls internally on long bodies instead.
   */
  dialog.edit-dialog {
    width: min(900px, 90vw);
    max-height: 85vh;
    padding: 16px;
    border: 1px solid #555;
    border-radius: 6px;
    background: #fff;
  }
  dialog.edit-dialog::backdrop {
    background: rgba(0, 0, 0, 0.35);
  }
  .edit-dialog h2 {
    margin: 0 0 12px 0;
    font-size: 16px;
    font-weight: 600;
  }
  .edit-dialog textarea {
    width: 100%;
    min-height: 320px;
    max-height: 60vh;
    padding: 8px;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 13px;
    line-height: 1.4;
    border: 1px solid #bbb;
    border-radius: 4px;
    box-sizing: border-box;
    resize: vertical;
  }
  .edit-dialog .dialog-error {
    margin: 8px 0 0 0;
    padding: 6px 8px;
    color: #b00020;
    background: #fdecea;
    border: 1px solid #f5c6cb;
    border-radius: 4px;
    font-size: 13px;
  }
  .edit-dialog .dialog-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 12px;
  }
  .edit-dialog .dialog-actions button {
    padding: 6px 14px;
    font-size: 14px;
    border: 1px solid #555;
    border-radius: 4px;
    background: #f5f5f5;
    cursor: pointer;
  }
  .prompt {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    flex: 1;
  }
  .prompt label {
    font-size: 14px;
    font-weight: 500;
    padding-top: 7px;
  }
  .prompt textarea {
    flex: 1;
    padding: 6px 8px;
    font-size: 14px;
    font-family: inherit;
    line-height: 1.4;
    border: 1px solid #bbb;
    border-radius: 4px;
    resize: none;
    max-height: 200px;
    overflow-y: hidden;
    box-sizing: border-box;
  }
  button#capture {
    padding: 8px 16px;
    font-size: 14px;
    font-weight: 500;
    border: 1px solid #555;
    border-radius: 4px;
    background: #f5f5f5;
    cursor: pointer;
  }
  button#capture:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  .highlight-bar {
    margin: 0 0 8px 0;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
  }
  .highlight-bar button {
    padding: 4px 12px;
    font-size: 14px;
    border: 1px solid #555;
    border-radius: 4px;
    background: #f5f5f5;
    cursor: pointer;
  }
  .highlight-bar button:disabled {
    opacity: 0.5;
  }
  hr {
    border: none;
    border-top: 2px solid #555;
    margin: 32px 0;
  }
  .image-box {
    display: flex;
    justify-content: center;
  }
  .image-wrap {
    position: relative;
    display: inline-block;
    border: 1px solid #888;
    line-height: 0;
    font-size: 0;
  }
  .image-box img {
    display: block;
    /* 90% of body content width (body has 24px margin on each side).
       max-height is set inline by fitImage() to fill remaining viewport. */
    max-width: calc((100vw - 48px) * 0.9 - 2px);
    width: auto;
    height: auto;
  }
  #overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    cursor: crosshair;
    user-select: none;
  }
</style>
</head>
<body>
  <!--
    Inline SVG sprite: every <use href="#copy-icon"> below points back
    here so the glyph is defined once. The host <svg> is hidden so it
    doesn't reserve layout space; <symbol> + <use> are the standard
    SVG primitive for this and don't need any JS.
  -->
  <svg width="0" height="0" style="position: absolute" aria-hidden="true">
    <defs>
      <!-- Standard "copy" glyph: two overlapping rounded rects. -->
      <symbol id="copy-icon" viewBox="0 0 24 24">
        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"
              fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round"></rect>
        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"
              fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round"></path>
      </symbol>
      <!-- Error glyph: filled circle with a white exclamation mark. -->
      <symbol id="error-icon" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="10" fill="currentColor"></circle>
        <rect x="11" y="6" width="2" height="8" fill="#fff"></rect>
        <rect x="11" y="16" width="2" height="2" fill="#fff"></rect>
      </symbol>
      <!-- Pencil glyph — edit action on the HTML row. -->
      <symbol id="edit-icon" viewBox="0 0 24 24">
        <path d="M4 20h4L19 9l-4-4L4 16v4z"
              fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round"></path>
        <path d="M14 6l4 4"
              fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round"></path>
      </symbol>
    </defs>
  </svg>

  <header>
    <img src="icons/icon-48.png" alt="">
    <span>SeeWhatISee: Capture screenshot</span>
  </header>

  <div class="capture-info">
    <label class="label" for="captured-url">Captured URL:</label>
    <input type="text" id="captured-url" readonly value="">
    <span class="label">HTML size:</span>
    <span id="html-size"></span>
  </div>

  <div class="controls">
    <div class="checkboxes">
      <div class="checkbox-row">
        <label><input type="checkbox" id="cap-screenshot" checked> Save <u>s</u>creenshot</label>
        <button type="button" class="copy-btn" id="copy-screenshot-name"
                title="Copy PNG filename"
                aria-label="Copy screenshot filename">
          <svg aria-hidden="true"><use href="#copy-icon"></use></svg>
        </button>
      </div>
      <div class="checkbox-row" id="row-html">
        <label><input type="checkbox" id="cap-html"> Save <u>H</u>TML</label>
        <button type="button" class="copy-btn" id="copy-html-name"
                title="Copy HTML filename"
                aria-label="Copy HTML filename">
          <svg aria-hidden="true"><use href="#copy-icon"></use></svg>
        </button>
        <!--
          Edit the captured HTML before save. Opens a modal dialog
          with a textarea prefilled with the current HTML. Follows the
          same disabled-hides-the-button convention as copy-btn so the
          row stays tidy. Disabled (and hidden) when the HTML scrape
          failed — there's nothing to edit in that case.
        -->
        <button type="button" class="copy-btn" id="edit-html"
                title="Edit page contents HTML"
                aria-label="Edit page contents HTML">
          <svg aria-hidden="true"><use href="#edit-icon"></use></svg>
        </button>
        <span class="error-icon" id="error-html" title="" role="img"
              aria-label="HTML capture error">
          <svg aria-hidden="true"><use href="#error-icon"></use></svg>
        </span>
      </div>
      <!--
        Default state is disabled + unchecked. capture-page.ts's
        loadData() flips these on when the SW reports a captured
        selection via its `getDetailsData` response. The body as a
        whole stays `visibility: hidden` until loadData resolves,
        so the user never sees this row in its disabled-default
        state during the SW round-trip.
      -->
      <div class="checkbox-row" id="row-selection">
        <label><input type="checkbox" id="cap-selection" disabled> Save selectio<u>n</u></label>
        <button type="button" class="copy-btn" id="copy-selection-name"
                title="Copy selection filename"
                aria-label="Copy selection filename" disabled>
          <svg aria-hidden="true"><use href="#copy-icon"></use></svg>
        </button>
        <!--
          Edit the captured selection before save. Opens a modal
          dialog with a textarea prefilled with the current selection
          HTML. Shares structure with the Edit HTML button above —
          capture-page.ts wires both via a shared helper.
        -->
        <button type="button" class="copy-btn" id="edit-selection"
                title="Edit selection HTML"
                aria-label="Edit selection HTML" disabled>
          <svg aria-hidden="true"><use href="#edit-icon"></use></svg>
        </button>
        <span class="error-icon" id="error-selection" title="" role="img"
              aria-label="Selection capture error">
          <svg aria-hidden="true"><use href="#error-icon"></use></svg>
        </span>
      </div>
    </div>
    <button id="capture">Capture</button>
    <div class="prompt">
      <label for="prompt-text">Prompt:</label>
      <textarea id="prompt-text" rows="1"></textarea>
    </div>
  </div>

  <!--
    Highlight toolbar. Drag on the image draws red rectangles; right-
    click-drag draws red lines. Redact converts the most recent
    unconverted red rectangle into an opaque black box (irreversibly
    hiding whatever was underneath in the saved PNG). Crop converts
    the most recent unconverted red rectangle at the top of the stack
    into a crop region (dims everything outside and shrinks the saved
    PNG to just that region). Both conversions are undoable.
  -->
  <div class="highlight-bar">
    <span><b>Add highlights below.</b> Drag to draw boxes, right-click-drag to draw lines. Use Redact or Crop to convert the latest box. Drag the image edges or corners to crop directly.</span>
    <button id="redact" disabled
            title="Turn the most recent red box into an opaque black redaction (hides that region in the saved screenshot). Disabled until you draw a red box.">Redact</button>
    <button id="crop" disabled
            title="Crop the screenshot to the most recently drawn red box. Disabled unless the top of the highlight stack is an un-converted red box.">Crop</button>
    <button id="undo" disabled
            title="Undo the most recent highlight, redaction, or crop.">Undo</button>
    <button id="clear" disabled
            title="Clear every highlight, redaction, and crop.">Clear</button>
  </div>

  <hr>

  <div class="image-box">
    <div class="image-wrap">
      <img id="preview" alt="Captured page">
      <svg id="overlay" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
  </div>

  <!--
    Edit-dialog template. Each editable artifact kind (HTML,
    selection, …) gets a cloned instance appended to <body> by
    capture-page.ts's `createEditDialog`, which fills in the
    per-kind `id`s, title text, and aria labels. Keeping the markup
    here (rather than building nodes by hand in JS) lets CSS
    selectors like `.edit-dialog textarea` apply uniformly to every
    instance. New kinds don't need any new markup.

    The per-instance ids follow a `edit-${kind}-${role}` convention
    (e.g. `edit-html-dialog`, `edit-selection-textarea`) so the e2e
    tests can locate the right element without the test file
    having to care which kinds exist.
  -->
  <template id="edit-dialog-template">
    <dialog class="edit-dialog">
      <h2 class="edit-dialog-title"></h2>
      <textarea class="edit-dialog-textarea" spellcheck="false"></textarea>
      <!--
        Hidden until Save fails; capture-page.ts toggles `hidden`
        and writes the SW error message into textContent.
        `role="alert"` lets screen readers announce it on appear.
      -->
      <p class="edit-dialog-error dialog-error" role="alert" hidden></p>
      <div class="dialog-actions">
        <button type="button" class="edit-dialog-cancel">Cancel</button>
        <button type="button" class="edit-dialog-save">Save</button>
      </div>
    </dialog>
  </template>

  <script src="capture-page.js"></script>
</body>
</html>
